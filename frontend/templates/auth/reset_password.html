{% extends "partials/base.html" %}
{% set hide_sidebar = true %}
{% block title %}Reset Password — SmartTrade AI{% endblock %}

{% block auth_content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="d-flex justify-content-center align-items-center gap-2 mb-3">
        <div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
        <span class="fs-4 fw-bold">SmartTrade <span class="text-accent">AI</span></span>
      </div>
      <h2 class="fw-bold">Choose a new password</h2>
      <p class="text-muted small">Must be at least 8 characters</p>
    </div>

    <form id="resetForm">
      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPassword" placeholder="••••••••" required minlength="8" />
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required minlength="8" />
      </div>

      <div id="rpMessage" class="alert py-2 d-none small"></div>

      <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="rpBtn">
        <span id="rpBtnText">Reset Password</span>
        <span class="spinner-border spinner-border-sm d-none ms-1" id="rpSpinner"></span>
      </button>
    </form>

    <div class="text-center">
      <a href="/login" class="text-accent small fw-semibold">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';
if (!token) {
  document.getElementById('rpMessage').textContent = 'Missing or invalid reset link — request a new one from the Forgot Password page.';
  document.getElementById('rpMessage').className = 'alert alert-danger py-2 small';
  document.getElementById('rpBtn').disabled = true;
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('rpBtn');
  const spinner = document.getElementById('rpSpinner');
  const msg = document.getElementById('rpMessage');
  const pwd = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (pwd !== confirm) {
    msg.textContent = 'Passwords do not match';
    msg.className = 'alert alert-danger py-2 small';
    return;
  }

  btn.disabled = true;
  spinner.classList.remove('d-none');
  msg.classList.add('d-none');

  try {
    const res = await fetch('/api/v1/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pwd }),
    });
    const data = await res.json();
    if (res.ok) {
      msg.textContent = data.message + ' Redirecting to login…';
      msg.className = 'alert alert-success py-2 small';
      setTimeout(() => window.location.href = '/login', 1800);
    } else {
      msg.textContent = data.error || 'Reset failed';
      msg.className = 'alert alert-danger py-2 small';
      btn.disabled = false;
    }
  } catch (err) {
    msg.textContent = 'Network error — is the server running?';
    msg.className = 'alert alert-danger py-2 small';
    btn.disabled = false;
  }
  spinner.classList.add('d-none');
});
</script>
{% endblock %}
